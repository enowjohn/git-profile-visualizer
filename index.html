<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Visualizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        
        <header class="text-center mb-12 fade-in">
            <h1 class="text-5xl font-bold text-gray-800 mb-4">
                <i class="fab fa-github mr-3"></i>JOHN'S GitHub Profile Visualizer
            </h1>
            <p class="text-xl text-gray-600">Enter a GitHub username to see beautiful visual statistics</p>
        </header>

        <section class="mb-12 fade-in">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="flex gap-4">
                        <div class="flex-1 relative">
                            <input 
                                type="text" 
                                id="usernameInput" 
                                placeholder="e.g., enowjohn, octocat, facebook"
                                class="w-full px-4 py-3 pr-12 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg"
                            >
                            <i class="fab fa-github absolute right-4 top-4 text-gray-400 text-xl"></i>
                        </div>
                        <button 
                            id="searchBtn"
                            class="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold text-lg"
                        >
                            <i class="fas fa-search mr-2"></i>Analyze
                        </button>
                    </div>
                    <div id="errorMessage" class="mt-4 text-red-600 hidden"></div>
                </div>
            </div>
        </section>

        <div id="loadingState" class="hidden text-center py-12">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-gray-600 text-lg">Analyzing GitHub profile...</p>
        </div>

        <div id="resultsSection" class="hidden">
            <section id="profileHeader" class="mb-12 fade-in">
            </section>

            <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                <div class="stat-card text-white rounded-lg p-6 text-center">
                    <i class="fas fa-code-branch text-3xl mb-3"></i>
                    <div class="text-3xl font-bold" id="repoCount">0</div>
                    <div class="text-sm opacity-90">Repositories</div>
                </div>
                <div class="stat-card text-white rounded-lg p-6 text-center">
                    <i class="fas fa-star text-3xl mb-3"></i>
                    <div class="text-3xl font-bold" id="starCount">0</div>
                    <div class="text-sm opacity-90">Total Stars</div>
                </div>
                <div class="stat-card text-white rounded-lg p-6 text-center cursor-pointer hover:opacity-90 transition-opacity" id="followersCard">
                    <i class="fas fa-users text-3xl mb-3"></i>
                    <div class="text-3xl font-bold" id="followerCount">0</div>
                    <div class="text-sm opacity-90">Followers</div>
                    <div class="text-xs opacity-75 mt-1">Click to view</div>
                </div>
                <div class="stat-card text-white rounded-lg p-6 text-center">
                    <i class="fas fa-user-check text-3xl mb-3"></i>
                    <div class="text-3xl font-bold" id="followingCount">0</div>
                    <div class="text-sm opacity-90">Following</div>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow-lg p-6 mb-12">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-chart-pie mr-2"></i>Language Distribution
                </h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div>
                        <canvas id="languageChart"></canvas>
                    </div>
                    <div id="languageList" class="space-y-3">
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow-lg p-6 mb-12">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-fire mr-2"></i>Contribution Activity
                </h2>
                <div id="contributionHeatmap" class="mb-4">
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span>Less</span>
                    <div class="flex gap-1">
                        <div class="w-4 h-4 bg-gray-200 rounded-sm"></div>
                        <div class="w-4 h-4 bg-green-200 rounded-sm"></div>
                        <div class="w-4 h-4 bg-green-300 rounded-sm"></div>
                        <div class="w-4 h-4 bg-green-400 rounded-sm"></div>
                        <div class="w-4 h-4 bg-green-500 rounded-sm"></div>
                    </div>
                    <span>More</span>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-trophy mr-2"></i>Top Repositories
                </h2>
                <div id="repoList" class="space-y-4">
                </div>
            </section>
        </div>
    </div>

    <!-- Followers Modal -->
    <div id="followersModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-4xl w-full max-h-[80vh] overflow-hidden">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold text-gray-800">
                        <i class="fas fa-users mr-2"></i>Followers
                    </h2>
                    <div class="flex items-center gap-4">
                        <button id="backToProfile" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">
                            <i class="fas fa-arrow-left mr-2"></i>Back to Profile
                        </button>
                        <button id="closeFollowersModal" class="text-gray-500 hover:text-gray-700 text-2xl">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <div id="followersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Followers will be populated here -->
                </div>
                <div id="followersLoading" class="text-center py-8 hidden">
                    <div class="loading-spinner mx-auto mb-4"></div>
                    <p class="text-gray-600">Loading followers...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
